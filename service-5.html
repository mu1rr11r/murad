<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Social Media Design Services - Abdulrahman Murad Portfolio">
<title>Social Media Design | Abdulrahman Murad</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Tajawal:wght@300;400;500;700;800&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styl.css">

<style>
:root{
  --black:#0a0a0a;
  --white:#f5f5f0;
  --green:#00ff6a;
  --text-muted:#888;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--black);
  overflow-x:hidden;
}

/* Navbar */

nav{
  padding:20px 40px;
}

.nav-logo img{
  display:block;
}

/* Back Button */

.service-back{
  position:fixed;
  top:90px;
  left:40px;
  z-index:100;
}

.service-back a{
  color:var(--green);
  text-decoration:none;
  font-family:'Space Mono', monospace;
  font-size:13px;
  letter-spacing:2px;
}

/* Project Preview */

.long-preview-section{
  padding:120px 20px;
  background:var(--black);
}

.preview-container{
  width:min(1200px,100%);
  margin:auto;

  border-radius:30px;
  overflow:hidden;

  border:1px solid rgba(0,255,106,.2);

  box-shadow:
    0 0 60px rgba(0,255,106,.08),
    inset 0 0 40px rgba(255,255,255,.03);

  background:#111;
}

.long-preview-image{
  width:100%;
  display:block;
}

/* Footer */

footer{
  padding:40px;
  text-align:center;
  color:#777;
}

/* Custom Cursor */

#cursor{
  width:10px;
  height:10px;
  background:var(--green);
  border-radius:50%;
  position:fixed;
  pointer-events:none;
  z-index:9999;
}

#cursor-ring{
  width:40px;
  height:40px;
  border:2px solid var(--green);
  border-radius:50%;
  position:fixed;
  pointer-events:none;
  z-index:9998;
  opacity:.5;
}

@media(max-width:768px){

  .service-back{
    left:20px;
  }

  #cursor,
  #cursor-ring{
    display:none;
  }

}
</style>
</head>

<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>

<nav id="navbar">
  <a href="index.html" class="nav-logo">
    <img src="./Img/2.png" width="80" alt="Logo">
  </a>
</nav>

<div class="service-back">
  <a href="index.html">← BACK</a>
</div>

<section class="long-preview-section">

  <div class="preview-container">
    <img
      src="./Img/profils/profilsat 1.26.32 PM.jpeg"
      alt="Full Project Screenshot"
      class="long-preview-image"
    >
  </div>

</section>

<footer>
  <div>© 2025 Abdulrahman Murad — All Rights Reserved</div>
</footer>

<script>
const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursor-ring');

let mouseX = window.innerWidth / 2;
let mouseY = window.innerHeight / 2;

let ringX = mouseX;
let ringY = mouseY;

document.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;

  cursor.style.transform =
    `translate(${mouseX}px, ${mouseY}px)`;
});

function animateCursor() {
  ringX += (mouseX - ringX) * 0.12;
  ringY += (mouseY - ringY) * 0.12;

  ring.style.transform =
    `translate(${ringX}px, ${ringY}px)`;

  requestAnimationFrame(animateCursor);
}

animateCursor();
</script>

</body>
</html>

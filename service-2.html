<style>
:root {
  --black: #0a0a0a;
  --white: #f5f5f0;
  --green: #00ff6a;
  --green-dim: #00cc55;
  --green-dark: #003d1a;
  --gray: #1a1a1a;
  --gray2: #2a2a2a;
  --gray3: #444;
  --text-muted: #888;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: var(--black);
  overflow-x: hidden;
}

.service-hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 40px;
  text-align: center;
}

.service-hero h1 {
  font-size: clamp(60px, 8vw, 100px);
  font-family: 'Bebas Neue', sans-serif;
  color: var(--white);
  margin-bottom: 20px;
  letter-spacing: 3px;
}

.service-hero em {
  color: var(--green);
  font-style: normal;
}

.service-hero p {
  font-size: 18px;
  color: var(--text-muted);
  max-width: 600px;
  line-height: 1.9;
  margin-bottom: 40px;
}

.service-back {
  position: fixed;
  top: 90px;
  left: 40px;
  z-index: 100;
}

.service-back a {
  color: var(--green);
  text-decoration: none;
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  letter-spacing: 2px;
}

.welcome-text {
  display: inline-block;
  padding: 12px 24px;
  background: rgba(0,255,106,0.1);
  border: 1px solid rgba(0,255,106,0.3);
  color: var(--green);
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  letter-spacing: 3px;
  margin-bottom: 20px;
}

/* ===============================
   IMAGE COMPARISON
================================ */

.image-comparison-section {
  padding: 100px 20px;
  display: flex;
  justify-content: center;
  align-items: center;
}

.comparison-container {
  position: relative;
  width: 100%;
  max-width: 950px;
  height: 550px;
  overflow: hidden;
  border-radius: 24px;
  border: 2px solid rgba(0,255,106,0.2);
  box-shadow:
    0 0 50px rgba(0,255,106,0.1),
    inset 0 0 50px rgba(0,255,106,0.05);
  cursor: ew-resize;
  user-select: none;
}

.before-image,
.after-image {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.image-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 50%;
  height: 100%;
  overflow: hidden;
}

.slider-line {
  position: absolute;
  top: 0;
  left: 50%;
  width: 3px;
  height: 100%;
  background: var(--green);
  transform: translateX(-50%);
  z-index: 20;
  box-shadow: 0 0 20px rgba(0,255,106,.5);
}

.slider-button {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: var(--green);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  font-weight: bold;
  color: var(--black);
  z-index: 30;
  box-shadow: 0 10px 30px rgba(0,255,106,0.4);
  cursor: grab;
}

.slider-button:active {
  cursor: grabbing;
}

footer {
  padding: 40px;
  text-align: center;
  color: #777;
}

/* ===============================
   CUSTOM CURSOR
================================ */

#cursor {
  width: 10px;
  height: 10px;
  background: var(--green);
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 9999;
}

#cursor-ring {
  width: 40px;
  height: 40px;
  border: 2px solid var(--green);
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 9998;
  opacity: .5;
}
/* ===========================
   LONG SCREEN PREVIEW
=========================== */

.long-preview-section {
  padding: 120px 20px;
  background: var(--black);
}

.section-title {
  text-align: center;
  margin-bottom: 50px;
}

.section-title span {
  color: var(--green);
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  letter-spacing: 3px;
}

.section-title h2 {
  color: var(--white);
  font-size: clamp(40px, 5vw, 70px);
  font-family: 'Bebas Neue', sans-serif;
  margin-top: 10px;
}

.preview-container {
  width: min(1200px, 100%);
  margin: auto;

  border-radius: 30px;
  overflow: hidden;

  border: 1px solid rgba(0,255,106,.2);

  box-shadow:
    0 0 60px rgba(0,255,106,.08),
    inset 0 0 40px rgba(255,255,255,.03);

  background: #111;
}

.long-preview-image {
  width: 100%;
  display: block;
}

@media(max-width:768px){

  .comparison-container{

  }

  .slider-button{

    height:55px;
    font-size:22px;
  }

  .service-back{

  }
}
</style>

<body>

<div id="cursor"></div>

<section class="service-hero">

  <h1>
    Social Media <em>Design</em>
  </h1>

  <p>
    Creative and engaging social media content
    designed to captivate your audience and
    boost your online presence across all
    digital platforms.
  </p>
</section>

<section class="image-comparison-section">

  <div class="comparison-container" id="comparisonContainer">

    <!-- BEFORE -->

      src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=1600&auto=format&fit=crop"

</section>
<section class="long-preview-section">


  <div class="preview-container">

    <img
      src="./Img/sochiel.png"

      class="long-preview-image"
    >

  </div>

</section>
<footer>
  <div>© 2025 Abdulrahman Murad — All Rights Reserved</div>
</footer>

<script>
/* ==========================
   CUSTOM CURSOR
========================== */

const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursor-ring');

let mouseX = window.innerWidth / 2;
let mouseY = window.innerHeight / 2;

let ringX = mouseX;
let ringY = mouseY;

document.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;

  cursor.style.transform =
    `translate(${mouseX}px, ${mouseY}px)`;
});

function animateCursor() {

  ringX += (mouseX - ringX) * 0.12;
  ringY += (mouseY - ringY) * 0.12;

  ring.style.transform =
    `translate(${ringX}px, ${ringY}px)`;

  requestAnimationFrame(animateCursor);
}

animateCursor();

/* ==========================
   IMAGE COMPARISON
========================== */

const container =
document.getElementById('comparisonContainer');

const overlay =
document.getElementById('imageOverlay');

const button =
document.getElementById('sliderButton');

const line =
document.getElementById('sliderLine');

let isDragging = false;

function moveSlider(clientX){

  const rect =
  container.getBoundingClientRect();

  let position =
  clientX - rect.left;

  position =
  Math.max(0,
  Math.min(position, rect.width));

  const percent =
  (position / rect.width) * 100;

  overlay.style.width =
  percent + '%';

  button.style.left =
  percent + '%';

  line.style.left =
  percent + '%';
}

/* Mouse + Touch + Tablet */

container.addEventListener(
'pointerdown',
(e)=>{
  isDragging = true;
  moveSlider(e.clientX);
});

window.addEventListener(
'pointermove',
(e)=>{
  if(!isDragging) return;
  moveSlider(e.clientX);
});

window.addEventListener(
'pointerup',
()=>{
  isDragging = false;
});
</script>

</body>
</html>

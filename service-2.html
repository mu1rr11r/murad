<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Social Media Design Services - Abdulrahman Murad Portfolio" />
  <title>Social Media Design | Abdulrahman Murad</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Tajawal:wght@300;400;500;700;800&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styl.css" />
  <style>
    :root {
      --black: #0a0a0a;
      --white: #f5f5f0;
      --green: #00ff6a;
      --green-dim: #00cc55;
      --green-dark: #003d1a;
      --gray: #1a1a1a;
      --gray2: #2a2a2a;
      --gray3: #444;
      --text-muted: #888;
    }

    .service-hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 40px; text-align: center; }
    .service-hero h1 { font-size: clamp(60px, 8vw, 100px); font-family: 'Bebas Neue', sans-serif; color: var(--white); margin-bottom: 20px; letter-spacing: 3px; }
    .service-hero em { color: var(--green); font-style: normal; }
    .service-hero p { font-size: 18px; color: var(--text-muted); max-width: 600px; line-height: 1.9; margin-bottom: 40px; }
    .service-content { padding: 80px 40px; background: var(--gray); }
    .service-back { position: fixed; top: 90px; left: 40px; z-index: 100; }
    .service-back a { color: var(--green); text-decoration: none; font-family: 'Space Mono', monospace; font-size: 13px; letter-spacing: 2px; transition: color 0.3s; }
    .service-back a:hover { color: var(--white); }
    .welcome-text { display: inline-block; padding: 12px 24px; background: rgba(0,255,106,0.1); border: 1px solid rgba(0,255,106,0.3); color: var(--green); font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 3px; margin-bottom: 20px; }

    /* Image Comparison CSS */
    .image-comparison-section {
      padding: 100px 40px;
      background: var(--black);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 600px;
    }

    .comparison-container {
      position: relative;
      width: 100%;
      max-width: 900px;
      height: 500px;
      overflow: hidden;
      border-radius: 20px;
      cursor: ew-resize;
      user-select: none;
      border: 2px solid rgba(0,255,106,0.2);
      box-shadow: 0 0 30px rgba(0,255,106,0.1);
    }

    .image {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .before-image {
      position: absolute;
      inset: 0;
    }

    .image-overlay {
      position: absolute;
      inset: 0;
      width: 50%;
      overflow: hidden;
    }

    .after-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .slider-line {
      position: absolute;
      top: 0;
      left: 50%;
      width: 3px;
      height: 100%;
      background: var(--green);
      transform: translateX(-50%);
      z-index: 5;
      box-shadow: 0 0 15px rgba(0,255,106,0.4);
    }

    .slider-button {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 60px;
      height: 60px;
      background: var(--green);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--black);
      font-size: 28px;
      font-weight: bold;
      box-shadow: 0 5px 25px rgba(0,255,106,0.3);
      z-index: 10;
      cursor: grab;
    }

    .slider-button:active {
      cursor: grabbing;
    }

    @media (max-width: 768px) {
      .image-comparison-section { padding: 60px 20px; }
      .comparison-container { height: 350px; }
      .slider-button { width: 50px; height: 50px; font-size: 22px; }
    }

    /* CUSTOM CURSOR */
    #cursor {
      width: 10px;
      height: 10px;
      background: var(--green);
      border-radius: 50%;
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 9999;
      mix-blend-mode: difference;
      will-change: transform;
    }

    #cursor-ring {
      width: 40px;
      height: 40px;
      border: 2px solid var(--green);
      border-radius: 50%;
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 9998;
      opacity: 0.6;
      will-change: transform;
    }

    #cursor.hovered,
    #cursor-ring.hovered {
      opacity: 1;
    }

    #cursor-ring.hovered {
      width: 50px;
      height: 50px;
    }
  </style>
</head>
<body>
  <!-- CUSTOM CURSOR -->
  <div id="cursor"></div>
  <div id="cursor-ring"></div>

  <nav id="navbar">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-img">
        <div class="nav-logo-placeholder"><img src="./Img/2.png" alt="" onerror="this.style.display='none'"></div>
      </div>
      <div class="nav-logo-text">
        Abdulrahman
        <span>GRAPHIC DESIGNER</span>
      </div>
    </a>
  </nav>

  <div class="service-back">
    <a href="index.html">← BACK</a>
  </div>

  <section class="service-hero">
    <div class="welcome-text">أهلاً وسهلاً</div>
    <h1>Social Media <em>Design</em></h1>
    <p>
      Creative and engaging social media content designed to captivate your audience 
      and boost your online presence across all digital platforms.
    </p>
  </section>

<section class="image-comparison-section">
  <div class="comparison-container" id="comparisonContainer">

    <!-- الصورة الأساسية -->
    <img
      src="https://images.unsplash.com/photo-1498050108023-c5249f4df085"
      class="image before-image"
      alt="Before"
    >

    <!-- الصورة الثانية -->
    <div class="image-overlay" id="imageOverlay">
      <img
        src="https://images.unsplash.com/photo-1460925895917-afdab827c52f"
        class="image after-image"
        alt="After"
      >
    </div>

    <!-- الخط -->
    <div class="slider-line" id="sliderLine"></div>

    <!-- الزرار -->
    <div class="slider-button" id="sliderButton">
      ↔
    </div>

  </div>
</section>
  <footer>
    <div class="footer-copy">© 2025 Abdulrahman Murad — All Rights Reserved</div>
    <div class="footer-dot"></div>
    <div class="footer-copy">Graphic Designer & Photographer</div>
  </footer>

  <script>
    // ============ CUSTOM CURSOR ============
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursor-ring');
    let mx = window.innerWidth / 2, my = window.innerHeight / 2;
    let rx = mx, ry = my;
    let ringAF;

    document.addEventListener('mousemove', e => {
      mx = e.clientX;
      my = e.clientY;
      cursor.style.left = mx + 'px';
      cursor.style.top = my + 'px';
    });

    function animateRing() {
      rx += (mx - rx) * 0.10;
      ry += (my - ry) * 0.10;
      ring.style.left = rx + 'px';
      ring.style.top = ry + 'px';
      ringAF = requestAnimationFrame(animateRing);
    }
    animateRing();

    const hoverTargets = 'a, button, .service-card, .tool-chip, .exp-item, .slider-button, .comparison-container';
    document.addEventListener('mouseover', e => {
      if (e.target.closest(hoverTargets)) {
        cursor.classList.add('hovered');
        ring.classList.add('hovered');
      }
    });
    document.addEventListener('mouseout', e => {
      if (e.target.closest(hoverTargets)) {
        cursor.classList.remove('hovered');
        ring.classList.remove('hovered');
      }
    });

    // ============ IMAGE COMPARISON SLIDER ============
    document.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('comparisonContainer');
      const overlay = document.getElementById('imageOverlay');
      const button = document.getElementById('sliderButton');
      const line = document.getElementById('sliderLine');

      if (!container || !overlay || !button || !line) {
        console.error('Image comparison elements not found');
        return;
      }

      let isDragging = false;

      function moveSlider(x) {
        const rect = container.getBoundingClientRect();
        let position = x - rect.left;

        if (position < 0) position = 0;
        if (position > rect.width) position = rect.width;

        const percent = (position / rect.width) * 100;

        overlay.style.width = percent + '%';
        button.style.left = percent + '%';
        line.style.left = percent + '%';
      }

      // Mouse events
      button.addEventListener('mousedown', () => {
        isDragging = true;
      });

      window.addEventListener('mouseup', () => {
        isDragging = false;
      });

      window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        moveSlider(e.clientX);
      });

      // Touch events
      button.addEventListener('touchstart', () => {
        isDragging = true;
      });

      window.addEventListener('touchend', () => {
        isDragging = false;
      });

      window.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        if (e.touches.length > 0) {
          moveSlider(e.touches[0].clientX);
        }
      });

      // Also allow dragging on the container itself
      container.addEventListener('mousedown', (e) => {
        isDragging = true;
        moveSlider(e.clientX);
      });

      container.addEventListener('touchstart', (e) => {
        isDragging = true;
        if (e.touches.length > 0) {
          moveSlider(e.touches[0].clientX);
        }
      });
    });
  </script>

  <script src="index.js"></script>
</body>
</html>
